<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet Intel - Live EV Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card-hover { transition: all 0.2s ease-in-out; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .data-fresh { border-left: 4px solid #10b981; }
        .data-stale { border-left: 4px solid #f59e0b; }
        .data-error { border-left: 4px solid #ef4444; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo & Title -->
                <div class="flex items-center">
                    <div class="text-2xl font-bold text-gray-900">Bet Intel</div>
                    <span class="ml-3 px-2 py-1 bg-blue-100 text-blue-800 text-xs font-medium rounded-full">LIVE</span>
                </div>
                
                <!-- Data Status & Actions -->
                <div class="flex items-center space-x-4">
                    <div id="dataStatus" class="flex items-center text-sm text-gray-600">
                        <div class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></div>
                        <span id="lastUpdated">Loading...</span>
                    </div>
                    <button id="refreshButton" class="p-2 text-gray-400 hover:text-gray-600 transition" title="Refresh data">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Quick Stats Bar -->
        <section class="mb-6">
            <div id="quickStatsContainer" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <!-- Loading state will be inserted here -->
            </div>
        </section>

        <!-- Filters & Search -->
        <section class="mb-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
                    <!-- Search Bar -->
                    <div class="flex-1 max-w-lg">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </div>
                            <input id="searchInput" type="text" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Search teams, events, sports...">
                        </div>
                    </div>

                    <!-- Quick Filters -->
                    <div class="flex flex-wrap gap-2">
                        <button class="filter-btn px-3 py-2 text-sm font-medium rounded-lg transition border bg-blue-600 text-white" data-sport="all">
                            All Sports
                        </button>
                        <button class="filter-btn px-3 py-2 text-sm font-medium rounded-lg transition border text-gray-700 bg-white" data-sport="basketball_nba">
                            🏀 NBA
                        </button>
                        <button class="filter-btn px-3 py-2 text-sm font-medium rounded-lg transition border text-gray-700 bg-white" data-sport="americanfootball_nfl">
                            🏈 NFL
                        </button>
                        <button class="filter-btn px-3 py-2 text-sm font-medium rounded-lg transition border text-gray-700 bg-white" data-sport="baseball_mlb">
                            ⚾ MLB
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- EV Opportunities Grid -->
        <section class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-900">
                    <span id="opportunityCount">Loading</span> EV Opportunities
                </h2>
                <div class="text-sm text-gray-600">
                    Next refresh: <span id="nextRefresh">--:--</span>
                </div>
            </div>
            
            <div id="opportunitiesContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading skeleton cards will be inserted here -->
            </div>

            <!-- Load More Button -->
            <div id="loadMoreContainer" class="text-center mt-8 hidden">
                <button id="loadMoreButton" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                    Load More Opportunities
                </button>
            </div>
        </section>

        <!-- Empty State -->
        <section id="emptyState" class="text-center py-12 hidden">
            <div class="text-6xl mb-4">📊</div>
            <h3 class="text-xl font-semibold text-gray-900 mb-2">No Opportunities Found</h3>
            <p class="text-gray-600 mb-6">Try adjusting your filters or check back later for new opportunities.</p>
            <button onclick="clearFilters()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                Clear Filters
            </button>
        </section>
    </main>

    <!-- Error Notification Container -->
    <div id="errorContainer" class="fixed top-4 right-4 z-50"></div>

    <!-- JavaScript -->
    <script>
        // API Configuration
        const API_CONFIG = {
            baseURL: window.location.hostname === 'localhost' 
                ? 'http://localhost:8000' 
                : 'https://api.betintel.com',
            timeout: 10000,
            refreshInterval: 180000 // 3 minutes
        };

        // Mock Data Service (simulates backend responses)
        class MockDataService {
            constructor() {
                this.cache = new Map();
            }

            async fetchEVOpportunities(params = {}) {
                // Simulate API delay
                await this.delay(Math.random() * 1000 + 500);

                return {
                    opportunities: this.generateMockOpportunities(params.limit || 12),
                    total_count: 42,
                    last_updated: new Date().toISOString(),
                    summary_stats: {
                        total_opportunities: 42,
                        best_ev_value: 24.50,
                        next_game_time: new Date(Date.now() + 4 * 3600000).toISOString(),
                        active_bookmakers: 3
                    }
                };
            }

            async fetchQuickStats() {
                await this.delay(300);
                
                return {
                    total_opportunities: 42,
                    best_ev_value: 24.50,
                    next_game: {
                        teams: 'Lakers @ Warriors',
                        sport: 'NBA',
                        commence_time: new Date(Date.now() + 4 * 3600000).toISOString(),
                        time_until: 4 * 3600 + 23 * 60 // 4h 23m in seconds
                    },
                    active_bookmakers: ['Pinnacle', 'DraftKings', 'FanDuel'],
                    data_freshness: {
                        last_odds_update: new Date().toISOString(),
                        update_frequency: 180
                    }
                };
            }

            generateMockOpportunities(count) {
                const sports = [
                    { key: 'basketball_nba', title: 'NBA' },
                    { key: 'americanfootball_nfl', title: 'NFL' },
                    { key: 'baseball_mlb', title: 'MLB' }
                ];

                const teams = [
                    ['Lakers', 'Warriors'], ['Celtics', 'Heat'], ['Nets', 'Bucks'],
                    ['Chiefs', 'Bills'], ['Cowboys', 'Eagles'], ['49ers', 'Rams'],
                    ['Yankees', 'Red Sox'], ['Dodgers', 'Giants'], ['Astros', 'Rangers']
                ];

                const bookmakers = ['Pinnacle', 'DraftKings', 'FanDuel', 'Caesars', 'BetMGM'];

                return Array(count).fill().map((_, i) => {
                    const sport = sports[Math.floor(Math.random() * sports.length)];
                    const teamPair = teams[Math.floor(Math.random() * teams.length)];
                    const bookmaker = bookmakers[Math.floor(Math.random() * bookmakers.length)];
                    const odds = Math.floor(Math.random() * 300) + 100;
                    const evValue = Math.random() * 30 + 5;
                    const confidence = Math.floor(Math.random() * 40) + 60;

                    return {
                        id: `opp-${i + 1}`,
                        event: {
                            id: `event-${i + 1}`,
                            sport_key: sport.key,
                            sport_title: sport.title,
                            commence_time: new Date(Date.now() + Math.random() * 86400000).toISOString(),
                            home_team: teamPair[1],
                            away_team: teamPair[0]
                        },
                        market: {
                            type: 'h2h',
                            description: 'Moneyline',
                            outcome: `${teamPair[0]} Win`
                        },
                        bookmaker: {
                            key: bookmaker.toLowerCase(),
                            title: bookmaker,
                            last_update: new Date().toISOString()
                        },
                        odds: {
                            current: odds
                        },
                        ev_calculations: {
                            standard: evValue - 3,
                            no_vig: evValue - 1,
                            weighted_fair: evValue,
                            confidence_score: confidence
                        },
                        probabilities: {
                            implied: 100 / (odds + 100) * 100,
                            fair_calculated: (100 / (odds + 100) * 100) + (evValue / 10),
                            edge_percentage: evValue / 10
                        },
                        kelly_criterion: {
                            percentage: (evValue / 10) * 0.5,
                            suggested_stake: (evValue / 10) * 10
                        }
                    };
                });
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // Application State
        class AppState {
            constructor() {
                this.currentFilters = {
                    sport_key: 'all',
                    search_query: ''
                };
                this.currentData = null;
                this.lastUpdated = null;
                this.refreshTimer = null;
                this.currentOffset = 0;
                this.hasMoreData = true;
            }
        }

        const appState = new AppState();
        const dataService = new MockDataService();

        // UI Renderers
        class UIRenderer {
            static renderQuickStats(stats) {
                const container = document.getElementById('quickStatsContainer');
                const nextGame = stats.next_game || {};
                
                container.innerHTML = `
                    <div class="p-6">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                            <div class="text-center">
                                <div class="text-2xl font-bold text-gray-900">${stats.total_opportunities || 0}</div>
                                <div class="text-sm text-gray-600">Opportunities</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold text-green-600">
                                    ${this.formatCurrency(stats.best_ev_value || 0)}
                                </div>
                                <div class="text-sm text-gray-600">Best EV</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold text-blue-600">
                                    ${this.formatTimeUntil(nextGame.time_until || 0)}
                                </div>
                                <div class="text-sm text-gray-600">Next Game</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold text-gray-900">${(stats.active_bookmakers || []).length}</div>
                                <div class="text-sm text-gray-600">Active Books</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            static renderOpportunityCard(opportunity) {
                const {
                    id,
                    event,
                    market,
                    bookmaker,
                    odds,
                    ev_calculations,
                    kelly_criterion
                } = opportunity;

                return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden card-hover" 
                         data-opportunity-id="${id}">
                        <!-- Sport & Confidence Badge -->
                        <div class="flex items-center justify-between p-4 pb-2">
                            <div class="flex items-center">
                                <div class="w-8 h-8 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 text-sm font-bold mr-3">
                                    ${this.getSportIcon(event.sport_key)}
                                </div>
                                <span class="text-sm font-medium text-gray-600">${event.sport_title}</span>
                            </div>
                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium ${this.getConfidenceBadgeClasses(ev_calculations.confidence_score)}">
                                ${this.getConfidenceLabel(ev_calculations.confidence_score)}
                            </span>
                        </div>

                        <!-- Event Info -->
                        <div class="px-4 pb-3">
                            <h3 class="text-lg font-semibold text-gray-900 mb-1">
                                ${event.away_team} @ ${event.home_team}
                            </h3>
                            <p class="text-sm text-gray-600">
                                ${this.formatDateTime(event.commence_time)} • ${market.description}
                            </p>
                        </div>

                        <!-- Bookmaker & Odds -->
                        <div class="px-4 pb-3">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-600">📊 ${bookmaker.title}</span>
                                <span class="text-lg font-mono font-semibold text-gray-900">
                                    ${this.formatOdds(odds.current)}
                                </span>
                            </div>
                            <div class="text-sm text-blue-600 font-medium">${market.outcome}</div>
                        </div>

                        <!-- EV Calculations -->
                        <div class="bg-green-50 border-t border-green-200 p-4">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm font-medium text-green-800">Expected Value</span>
                                <span class="text-xl font-bold text-green-600">
                                    ${this.formatCurrency(ev_calculations.weighted_fair)}
                                </span>
                            </div>
                            <div class="grid grid-cols-3 gap-2 text-xs text-green-700">
                                <div>Standard: ${this.formatCurrency(ev_calculations.standard)}</div>
                                <div>No-Vig: ${this.formatCurrency(ev_calculations.no_vig)}</div>
                                <div>Weighted: ${this.formatCurrency(ev_calculations.weighted_fair)}</div>
                            </div>
                        </div>

                        <!-- Kelly Criterion -->
                        <div class="px-4 py-3 bg-gray-50 border-t border-gray-200">
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-gray-600">Suggested Stake:</span>
                                <span class="font-medium text-gray-900">
                                    ${this.formatCurrency(kelly_criterion.suggested_stake)} 
                                    <span class="text-gray-500">(${kelly_criterion.percentage.toFixed(1)}%)</span>
                                </span>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="p-4 pt-2">
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="viewEventDetails('${event.id}')" 
                                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium text-sm">
                                    View Details
                                </button>
                                <button onclick="addToWatchlist('${id}')" 
                                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium text-sm">
                                    📍 Watch
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            static renderLoadingSkeletons(count = 6) {
                const skeletons = Array(count).fill().map(() => `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden animate-pulse">
                        <div class="p-4 pb-2">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center">
                                    <div class="w-8 h-8 bg-gray-200 rounded-full mr-3"></div>
                                    <div class="bg-gray-200 rounded h-4 w-16"></div>
                                </div>
                                <div class="bg-gray-200 rounded-full h-6 w-16"></div>
                            </div>
                        </div>
                        <div class="px-4 pb-3">
                            <div class="bg-gray-200 rounded h-6 w-3/4 mb-2"></div>
                            <div class="bg-gray-200 rounded h-4 w-1/2"></div>
                        </div>
                        <div class="px-4 pb-3">
                            <div class="flex justify-between mb-2">
                                <div class="bg-gray-200 rounded h-4 w-24"></div>
                                <div class="bg-gray-200 rounded h-6 w-16"></div>
                            </div>
                            <div class="bg-gray-200 rounded h-4 w-20"></div>
                        </div>
                        <div class="bg-gray-50 border-t border-gray-200 p-4">
                            <div class="bg-gray-200 rounded h-8 w-full mb-2"></div>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="bg-gray-200 rounded h-4"></div>
                                <div class="bg-gray-200 rounded h-4"></div>
                                <div class="bg-gray-200 rounded h-4"></div>
                            </div>
                        </div>
                        <div class="p-4 pt-2">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-gray-200 rounded h-8"></div>
                                <div class="bg-gray-200 rounded h-8"></div>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                return skeletons;
            }

            // Helper methods
            static getSportIcon(sportKey) {
                const icons = {
                    'basketball_nba': '🏀',
                    'americanfootball_nfl': '🏈',
                    'baseball_mlb': '⚾',
                    'icehockey_nhl': '🏒',
                    'soccer_epl': '⚽'
                };
                return icons[sportKey] || '🏆';
            }

            static getConfidenceBadgeClasses(score) {
                if (score >= 80) return 'bg-green-100 text-green-800';
                if (score >= 60) return 'bg-yellow-100 text-yellow-800';
                return 'bg-gray-100 text-gray-800';
            }

            static getConfidenceLabel(score) {
                if (score >= 80) return '🔥 HIGH';
                if (score >= 60) return '📈 MEDIUM';
                return '✅ LOW';
            }

            static formatOdds(odds) {
                return odds > 0 ? `+${odds}` : odds.toString();
            }

            static formatCurrency(amount) {
                const sign = amount >= 0 ? '+' : '';
                return `${sign}$${Math.abs(amount).toFixed(2)}`;
            }

            static formatDateTime(isoString) {
                const date = new Date(isoString);
                const today = new Date();
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);

                const timeString = date.toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });

                if (date.toDateString() === today.toDateString()) {
                    return `Today, ${timeString}`;
                } else if (date.toDateString() === tomorrow.toDateString()) {
                    return `Tomorrow, ${timeString}`;
                } else {
                    return `${date.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric' 
                    })}, ${timeString}`;
                }
            }

            static formatTimeUntil(seconds) {
                if (seconds <= 0) return 'Started';
                
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                
                if (hours > 0) {
                    return `${hours}h ${minutes}m`;
                } else {
                    return `${minutes}m`;
                }
            }
        }

        // Error Handler
        class ErrorHandler {
            static show(message, type = 'error') {
                const container = document.getElementById('errorContainer');
                const id = 'error-' + Date.now();
                
                const colorClasses = {
                    error: 'bg-red-100 border-red-400 text-red-700',
                    warning: 'bg-yellow-100 border-yellow-400 text-yellow-700',
                    info: 'bg-blue-100 border-blue-400 text-blue-700'
                };

                const errorDiv = document.createElement('div');
                errorDiv.id = id;
                errorDiv.className = `${colorClasses[type]} px-4 py-3 rounded-lg shadow-lg mb-4 max-w-md`;
                errorDiv.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="text-sm">${message}</span>
                        <button onclick="document.getElementById('${id}').remove()" class="ml-4 text-current opacity-70 hover:opacity-100">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </div>
                `;

                container.appendChild(errorDiv);

                // Auto-remove after 5 seconds
                setTimeout(() => {
                    if (document.getElementById(id)) {
                        document.getElementById(id).remove();
                    }
                }, 5000);
            }
        }

        // Application Logic
        async function loadDashboardData() {
            try {
                // Show loading states
                document.getElementById('quickStatsContainer').innerHTML = `
                    <div class="p-6">
                        <div class="animate-pulse grid grid-cols-2 md:grid-cols-4 gap-6">
                            ${Array(4).fill().map(() => `
                                <div class="text-center">
                                    <div class="bg-gray-200 rounded h-8 w-16 mx-auto mb-2"></div>
                                    <div class="bg-gray-200 rounded h-4 w-20 mx-auto"></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;

                document.getElementById('opportunitiesContainer').innerHTML = UIRenderer.renderLoadingSkeletons();

                // Show loading spinner on refresh button
                const refreshBtn = document.getElementById('refreshButton');
                const refreshIcon = refreshBtn.querySelector('svg');
                refreshIcon.classList.add('spin');

                // Fetch data
                const [statsData, opportunitiesData] = await Promise.all([
                    dataService.fetchQuickStats(),
                    dataService.fetchEVOpportunities({
                        ...appState.currentFilters,
                        limit: 12,
                        offset: 0
                    })
                ]);

                // Render data
                UIRenderer.renderQuickStats(statsData);
                renderOpportunities(opportunitiesData);
                
                // Update app state
                appState.currentData = opportunitiesData;
                appState.lastUpdated = new Date();
                appState.currentOffset = opportunitiesData.opportunities.length;
                appState.hasMoreData = opportunitiesData.opportunities.length === 12;

                // Update UI status
                updateDataStatus();
                updateOpportunityCount(opportunitiesData.total_count);
                
                // Show/hide load more button
                const loadMoreContainer = document.getElementById('loadMoreContainer');
                if (appState.hasMoreData) {
                    loadMoreContainer.classList.remove('hidden');
                } else {
                    loadMoreContainer.classList.add('hidden');
                }

                // Remove loading spinner
                refreshIcon.classList.remove('spin');

                // Show success notification
                ErrorHandler.show('Data refreshed successfully!', 'info');

            } catch (error) {
                console.error('Failed to load dashboard data:', error);
                ErrorHandler.show('Failed to load data. Please check your connection and try again.');
                
                // Remove loading spinner
                const refreshBtn = document.getElementById('refreshButton');
                const refreshIcon = refreshBtn.querySelector('svg');
                refreshIcon.classList.remove('spin');
            }
        }

        function renderOpportunities(data) {
            const container = document.getElementById('opportunitiesContainer');
            const emptyState = document.getElementById('emptyState');

            if (!data.opportunities || data.opportunities.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            const opportunityCards = data.opportunities.map(opportunity => 
                UIRenderer.renderOpportunityCard(opportunity)
            ).join('');

            if (appState.currentOffset === 0) {
                container.innerHTML = opportunityCards;
            } else {
                container.innerHTML += opportunityCards;
            }
        }

        async function loadMoreOpportunities() {
            if (!appState.hasMoreData) return;

            const loadMoreButton = document.getElementById('loadMoreButton');
            const originalText = loadMoreButton.textContent;
            loadMoreButton.textContent = 'Loading...';
            loadMoreButton.disabled = true;

            try {
                const data = await dataService.fetchEVOpportunities({
                    ...appState.currentFilters,
                    limit: 12,
                    offset: appState.currentOffset
                });

                renderOpportunities(data);
                appState.currentOffset += data.opportunities.length;
                appState.hasMoreData = data.opportunities.length === 12;

                if (!appState.hasMoreData) {
                    document.getElementById('loadMoreContainer').classList.add('hidden');
                }

            } catch (error) {
                ErrorHandler.show('Failed to load more opportunities.');
            } finally {
                loadMoreButton.textContent = originalText;
                loadMoreButton.disabled = false;
            }
        }

        function updateDataStatus() {
            const statusElement = document.getElementById('lastUpdated');
            const dataStatus = document.getElementById('dataStatus');
            
            if (appState.lastUpdated) {
                const timeAgo = Math.floor((Date.now() - appState.lastUpdated.getTime()) / 1000);
                const minutes = Math.floor(timeAgo / 60);
                
                if (minutes === 0) {
                    statusElement.textContent = 'Just updated';
                } else {
                    statusElement.textContent = `Updated ${minutes}m ago`;
                }

                // Update status indicator
                const indicator = dataStatus.querySelector('.w-2.h-2');
                if (minutes < 5) {
                    indicator.className = 'w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse';
                } else if (minutes < 10) {
                    indicator.className = 'w-2 h-2 bg-yellow-500 rounded-full mr-2';
                } else {
                    indicator.className = 'w-2 h-2 bg-red-500 rounded-full mr-2';
                }
            }
        }

        function updateOpportunityCount(count) {
            document.getElementById('opportunityCount').textContent = count || 0;
        }

        function startAutoRefresh() {
            if (appState.refreshTimer) {
                clearInterval(appState.refreshTimer);
            }

            appState.refreshTimer = setInterval(() => {
                if (!document.hidden) {
                    loadDashboardData();
                }
            }, API_CONFIG.refreshInterval);
        }

        function updateNextRefreshTime() {
            const nextRefreshElement = document.getElementById('nextRefresh');
            let nextRefreshTime = new Date(Date.now() + API_CONFIG.refreshInterval);
            
            const updateTimer = setInterval(() => {
                const now = new Date();
                const diff = nextRefreshTime - now;
                
                if (diff > 0) {
                    const minutes = Math.floor(diff / 60000);
                    const seconds = Math.floor((diff % 60000) / 1000);
                    nextRefreshElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                } else {
                    nextRefreshElement.textContent = 'Refreshing...';
                    nextRefreshTime = new Date(Date.now() + API_CONFIG.refreshInterval);
                }
            }, 1000);
        }

        // Event Handlers
        function setupEventHandlers() {
            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Update active state
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white');
                        b.classList.add('text-gray-700', 'bg-white');
                    });
                    
                    e.target.classList.add('bg-blue-600', 'text-white');
                    e.target.classList.remove('text-gray-700', 'bg-white');

                    // Update filter
                    appState.currentFilters.sport_key = e.target.dataset.sport;
                    appState.currentOffset = 0;
                    loadDashboardData();
                });
            });

            // Search input
            let searchTimeout;
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    appState.currentFilters.search_query = e.target.value;
                    appState.currentOffset = 0;
                    loadDashboardData();
                }, 500);
            });

            // Refresh button
            document.getElementById('refreshButton').addEventListener('click', () => {
                loadDashboardData();
            });

            // Load more button
            document.getElementById('loadMoreButton').addEventListener('click', loadMoreOpportunities);

            // Update data status every 30 seconds
            setInterval(updateDataStatus, 30000);
        }

        // Global Functions (called from HTML)
        function viewEventDetails(eventId) {
            window.location.href = `event-detail.html?id=${eventId}`;
        }

        function addToWatchlist(opportunityId) {
            ErrorHandler.show('Added to watchlist!', 'info');
        }

        function clearFilters() {
            appState.currentFilters = {
                sport_key: 'all',
                search_query: ''
            };
            
            // Reset UI
            document.getElementById('searchInput').value = '';
            
            // Reset filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('text-gray-700', 'bg-white');
            });
            document.querySelector('[data-sport="all"]').classList.add('bg-blue-600', 'text-white');

            appState.currentOffset = 0;
            loadDashboardData();
        }

        // Initialize Application
        document.addEventListener('DOMContentLoaded', () => {
            setupEventHandlers();
            loadDashboardData();
            startAutoRefresh();
            updateNextRefreshTime();
        });
    </script>
</body>
