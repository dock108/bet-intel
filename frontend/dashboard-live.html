<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet Intel - Live EV Dashboard (Real Data)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card-hover { transition: all 0.2s ease-in-out; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .data-fresh { border-left: 4px solid #10b981; }
        .data-stale { border-left: 4px solid #f59e0b; }
        .data-error { border-left: 4px solid #ef4444; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo & Title -->
                <div class="flex items-center">
                    <div class="text-2xl font-bold text-gray-900">Bet Intel</div>
                    <span class="ml-3 px-2 py-1 bg-green-100 text-green-800 text-xs font-medium rounded-full">REAL DATA</span>
                </div>
                
                <!-- Data Status & Actions -->
                <div class="flex items-center space-x-4">
                    <div id="dataStatus" class="flex items-center text-sm text-gray-600">
                        <div class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></div>
                        <span id="lastUpdated">Loading...</span>
                    </div>
                    <button id="refreshButton" class="p-2 text-gray-400 hover:text-gray-600 transition" title="Refresh data">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Quick Stats Bar -->
        <section class="mb-6">
            <div id="quickStatsContainer" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <!-- Loading state will be inserted here -->
            </div>
        </section>

        <!-- Filters & Search -->
        <section class="mb-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
                    <!-- Search Bar -->
                    <div class="flex-1 max-w-lg">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </div>
                            <input id="searchInput" type="text" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Search teams, events, sports...">
                        </div>
                    </div>

                    <!-- Quick Filters -->
                    <div class="flex flex-wrap gap-2">
                        <button class="filter-btn px-3 py-2 text-sm font-medium rounded-lg transition border bg-blue-600 text-white" data-sport="">
                            All Sports
                        </button>
                        <button class="filter-btn px-3 py-2 text-sm font-medium rounded-lg transition border text-gray-700 bg-white" data-sport="basketball_nba">
                            🏀 NBA
                        </button>
                        <button class="filter-btn px-3 py-2 text-sm font-medium rounded-lg transition border text-gray-700 bg-white" data-sport="americanfootball_nfl">
                            🏈 NFL
                        </button>
                        <button class="filter-btn px-3 py-2 text-sm font-medium rounded-lg transition border text-gray-700 bg-white" data-sport="baseball_mlb">
                            ⚾ MLB
                        </button>
                    </div>

                    <!-- Advanced Filters -->
                    <div class="flex items-center space-x-4">
                        <select id="sortSelect" class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="ev_weighted">Best EV</option>
                            <option value="commence_time">Start Time</option>
                        </select>
                        <div class="flex items-center space-x-2">
                            <label for="minEVFilter" class="text-sm text-gray-600">Min EV:</label>
                            <input id="minEVFilter" type="number" min="-1000" step="0.50" value="-1000" placeholder="-1000" class="w-20 border border-gray-300 rounded px-2 py-1 text-sm">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- EV Opportunities Grid -->
        <section class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-900">
                    <span id="opportunityCount">Loading</span> EV Opportunities
                    <span class="text-sm font-normal text-gray-600">(P2P + Traditional)</span>
                </h2>
                <p class="text-xs text-gray-500 mb-2">
                    P2P Exchanges: Novig, ProphetX, BetOpenly • Traditional: Pinnacle, DraftKings, FanDuel
                </p>
                <div class="text-sm text-gray-600">
                    Next refresh: <span id="nextRefresh">--:--</span>
                </div>
            </div>
            
            <div id="opportunitiesContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading skeleton cards will be inserted here -->
            </div>

            <!-- Load More Button -->
            <div id="loadMoreContainer" class="text-center mt-8 hidden">
                <button id="loadMoreButton" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                    Load More Opportunities
                </button>
            </div>
        </section>

        <!-- Empty State -->
        <section id="emptyState" class="text-center py-12 hidden">
            <div class="text-6xl mb-4">📊</div>
            <h3 class="text-xl font-semibold text-gray-900 mb-2">No Opportunities Found</h3>
            <p class="text-gray-600 mb-6">Try adjusting your filters or check back later for new opportunities.</p>
            <button onclick="clearFilters()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                Clear Filters
            </button>
        </section>
    </main>

    <!-- Error Notification Container -->
    <div id="errorContainer" class="fixed top-4 right-4 z-50"></div>

    <!-- JavaScript -->
    <script>
        // API Configuration for Real Backend
        const API_CONFIG = {
            baseURL: 'http://localhost:8000',
            timeout: 10000,
            refreshInterval: 180000 // 3 minutes
        };

        // Real Data Service (connects to FastAPI backend)
        class LiveDataService {
            constructor() {
                this.cache = new Map();
            }

            async fetchEVOpportunities(params = {}) {
                const url = new URL(`${API_CONFIG.baseURL}/api/ev-opportunities`);
                
                // Add query parameters
                Object.entries(params).forEach(([key, value]) => {
                    if (value !== undefined && value !== null && value !== '' && value !== 'all') {
                        url.searchParams.append(key, value.toString());
                    }
                });

                try {
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        signal: AbortSignal.timeout(API_CONFIG.timeout)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    this.updateCache('ev-opportunities', data);
                    return data;
                } catch (error) {
                    console.error('Failed to fetch EV opportunities:', error);
                    throw error;
                }
            }

            async fetchQuickStats() {
                try {
                    const response = await fetch(`${API_CONFIG.baseURL}/health`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    // For now, return basic stats since we don't have a dedicated stats endpoint
                    return {
                        total_opportunities: 0,
                        best_ev_value: 0,
                        next_game: { 
                            teams: 'Loading...', 
                            sport: '', 
                            commence_time: new Date().toISOString(), 
                            time_until: 0 
                        },
                        active_bookmakers: ['Pinnacle', 'DraftKings', 'FanDuel'],
                        data_freshness: {
                            last_odds_update: new Date().toISOString(),
                            update_frequency: 180
                        }
                    };
                } catch (error) {
                    console.error('Failed to fetch stats:', error);
                    throw error;
                }
            }

            updateCache(key, data) {
                this.cache.set(key, {
                    data,
                    timestamp: Date.now()
                });
            }
        }

        // Application State
        class AppState {
            constructor() {
                this.currentFilters = {
                    sport_key: '',
                    search_query: '',
                    min_ev_threshold: -1000,  // Show all EVs, including negative
                    positive_ev_only: false,  // Show both positive and negative EVs
                    sort_by: 'ev_weighted'
                };
                this.currentData = null;
                this.lastUpdated = null;
                this.refreshTimer = null;
                this.currentOffset = 0;
                this.hasMoreData = true;
            }
        }

        const appState = new AppState();
        const dataService = new LiveDataService();

        // UI Renderers
        class UIRenderer {
            static renderQuickStats(stats) {
                const container = document.getElementById('quickStatsContainer');
                const nextGame = stats.next_game || {};
                
                container.innerHTML = `
                    <div class="p-6">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                            <div class="text-center">
                                <div class="text-2xl font-bold text-gray-900">${stats.total_opportunities || 0}</div>
                                <div class="text-sm text-gray-600">Opportunities</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold text-green-600">
                                    ${this.formatPercentage(stats.best_ev_value || 0)}
                                </div>
                                <div class="text-sm text-gray-600">Best EV</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold text-blue-600">
                                    ${this.formatTimeUntil(nextGame.time_until || 0)}
                                </div>
                                <div class="text-sm text-gray-600">Next Game</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold text-gray-900">${(stats.active_bookmakers || []).length}</div>
                                <div class="text-sm text-gray-600">Active Books</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            static renderOpportunityCard(opportunity) {
                const CORE_BOOKMAKERS = {
                    'pinnacle': '🏛️ Pinnacle',
                    'draftkings': '👑 DraftKings', 
                    'fanduel': '🎯 FanDuel',
                    'novig': '⚡ Novig',
                    'prophetx': '🔮 ProphetX',
                    'betopenly': '🌐 BetOpenly'
                };
                
                const bookmakerAnalysis = opportunity.bookmaker_analysis || {};
                const summary = opportunity.summary || {};
                const positiveEvReqs = opportunity.positive_ev_requirements || {};
                
                // Extract team names
                const [awayTeam, homeTeam] = opportunity.event_name.split(' @ ');
                
                // Calculate +2% EV requirements for each team (find best case scenario)
                const getTeamEvRequirements = (outcomeKey, teamName) => {
                    const requirements = [];
                    Object.keys(positiveEvReqs).forEach(reqKey => {
                        if (reqKey.includes(outcomeKey)) {
                            const req = positiveEvReqs[reqKey];
                            requirements.push(req);
                        }
                    });
                    
                    if (requirements.length === 0) return null;
                    
                    // Find the best (lowest) required odds for +2% EV
                    const bestReq = requirements.reduce((best, current) => {
                        if (current.required_odds_for_2pct_ev > 0) {
                            return (!best || current.required_odds_for_2pct_ev < best.required_odds_for_2pct_ev) ? current : best;
                        } else {
                            return (!best || current.required_odds_for_2pct_ev > best.required_odds_for_2pct_ev) ? current : best;
                        }
                    }, null);
                    
                    return bestReq;
                };
                
                const awayTeamReq = getTeamEvRequirements('outcome_A', awayTeam);
                const homeTeamReq = getTeamEvRequirements('outcome_B', homeTeam);
                
                // Get current best odds for each team
                const getTeamBestCurrentOdds = (outcomeKey) => {
                    let bestOdds = null;
                    let bestEv = -Infinity;
                    
                    Object.keys(bookmakerAnalysis).forEach(bookmakerKey => {
                        const bookmaker = bookmakerAnalysis[bookmakerKey];
                        const outcomes = bookmaker.outcomes || {};
                        if (outcomes[outcomeKey] && outcomes[outcomeKey][0]) {
                            const outcome = outcomes[outcomeKey][0];
                            if (outcome.ev_percentage > bestEv) {
                                bestEv = outcome.ev_percentage;
                                bestOdds = outcome.offered_odds;
                            }
                        }
                    });
                    
                    return { odds: bestOdds, ev: bestEv };
                };
                
                const awayBest = getTeamBestCurrentOdds('outcome_A');
                const homeBest = getTeamBestCurrentOdds('outcome_B');
                
                // Render P2P vs Traditional sections
                const renderBookmakerSection = (sectionTitle, bookmakerKeys, bgColor, borderColor) => {
                    const sectionBookmakers = bookmakerKeys.filter(key => bookmakerAnalysis[key]);
                    
                    if (sectionBookmakers.length === 0) {
                        return `
                            <div class="mb-4">
                                <h4 class="text-sm font-semibold text-gray-700 mb-2">${sectionTitle}</h4>
                                <div class="text-xs text-gray-500 italic">No data available</div>
                            </div>
                        `;
                    }
                    
                    const bookmakerCards = sectionBookmakers.map(bookmakerKey => {
                        const bookmakerData = bookmakerAnalysis[bookmakerKey];
                        const bookmakerTitle = CORE_BOOKMAKERS[bookmakerKey];
                        const outcomes = bookmakerData.outcomes || {};
                        
                        const renderOutcome = (outcomeKey, teamName) => {
                            const outcomeData = outcomes[outcomeKey] && outcomes[outcomeKey][0];
                            if (!outcomeData) {
                                return `
                                    <div class="text-center p-3 border border-gray-200 rounded bg-gray-50">
                                        <div class="text-sm text-gray-500">${teamName}</div>
                                        <div class="text-xs text-gray-400">No data</div>
                                    </div>
                                `;
                            }
                            
                            const evColor = outcomeData.has_positive_ev ? 'text-green-600' : 'text-red-600';
                            const bgColor = outcomeData.has_positive_ev ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200';
                            
                            // Fix fair odds display for negative numbers
                            const fairOddsDisplay = outcomeData.no_vig_fair_odds > 0 
                                ? `+${outcomeData.no_vig_fair_odds.toFixed(0)}`
                                : `${outcomeData.no_vig_fair_odds.toFixed(0)}`;
                            
                            return `
                                <div class="text-center p-3 border rounded ${bgColor}">
                                    <div class="text-sm font-medium text-gray-800 mb-2">${teamName}</div>
                                    <div class="text-lg font-bold text-gray-900">${outcomeData.offered_odds > 0 ? '+' : ''}${outcomeData.offered_odds}</div>
                                    <div class="text-sm ${evColor} font-semibold">${this.formatPercentage(outcomeData.ev_percentage)}</div>
                                    <div class="text-xs text-gray-600 mt-2">
                                        No-vig: ${fairOddsDisplay}
                                    </div>
                                </div>
                            `;
                        };
                        
                        return `
                            <div class="border ${borderColor} rounded-lg p-4 ${bgColor}">
                                <div class="text-sm font-semibold text-gray-900 mb-3 text-center">${bookmakerTitle}</div>
                                <div class="grid grid-cols-2 gap-4">
                                    ${renderOutcome('outcome_A', awayTeam)}
                                    ${renderOutcome('outcome_B', homeTeam)}
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    return `
                        <div class="mb-8">
                            <h4 class="text-base font-semibold text-gray-800 mb-4">${sectionTitle}</h4>
                            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                                ${bookmakerCards}
                            </div>
                        </div>
                    `;
                };
                
                return `
                    <div class="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow overflow-hidden mb-8">
                        <!-- Event Header -->
                        <div class="px-8 py-6 bg-gray-50 border-b border-gray-200">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-xl font-bold text-gray-900">${opportunity.event_name}</h3>
                                    <p class="text-sm text-gray-600 mt-1">${opportunity.sport} • ${new Date(opportunity.commence_time).toLocaleString()}</p>
                                </div>
                                <div class="text-right">
                                    <div class="text-2xl font-bold ${summary.best_available_ev > 0 ? 'text-green-600' : 'text-red-600'}">
                                        ${this.formatPercentage(summary.best_available_ev || 0)}
                                    </div>
                                    <div class="text-sm text-gray-500">Best Available EV</div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- +2% EV Requirements Section -->
                        <div class="px-8 py-6 bg-blue-50 border-b border-blue-200">
                            <h4 class="text-base font-semibold text-blue-900 mb-4">📈 For +2% Expected Value, Need These Odds:</h4>
                            <div class="grid grid-cols-2 gap-8">
                                <div class="text-center">
                                    <div class="text-sm text-gray-700 mb-2 font-medium">${awayTeam}</div>
                                    <div class="text-xl font-bold text-gray-900">
                                        Currently: ${awayBest.odds ? (awayBest.odds > 0 ? '+' : '') + awayBest.odds : 'N/A'}
                                    </div>
                                    <div class="text-base ${awayBest.ev > 0 ? 'text-green-600' : 'text-red-600'} font-medium">
                                        EV: ${awayBest.ev !== null ? this.formatPercentage(awayBest.ev) : 'N/A'}
                                    </div>
                                    ${awayTeamReq ? `
                                        <div class="mt-3 text-base font-bold text-blue-700">
                                            Need: ${awayTeamReq.required_odds_for_2pct_ev > 0 ? '+' : ''}${awayTeamReq.required_odds_for_2pct_ev}
                                        </div>
                                        <div class="text-sm text-gray-600">
                                            Improvement: ${awayTeamReq.improvement_needed}
                                        </div>
                                    ` : `
                                        <div class="text-sm text-green-600 font-bold mt-3">✅ Already +EV!</div>
                                    `}
                                </div>
                                
                                <div class="text-center">
                                    <div class="text-sm text-gray-700 mb-2 font-medium">${homeTeam}</div>
                                    <div class="text-xl font-bold text-gray-900">
                                        Currently: ${homeBest.odds ? (homeBest.odds > 0 ? '+' : '') + homeBest.odds : 'N/A'}
                                    </div>
                                    <div class="text-base ${homeBest.ev > 0 ? 'text-green-600' : 'text-red-600'} font-medium">
                                        EV: ${homeBest.ev !== null ? this.formatPercentage(homeBest.ev) : 'N/A'}
                                    </div>
                                    ${homeTeamReq ? `
                                        <div class="mt-3 text-base font-bold text-blue-700">
                                            Need: ${homeTeamReq.required_odds_for_2pct_ev > 0 ? '+' : ''}${homeTeamReq.required_odds_for_2pct_ev}
                                        </div>
                                        <div class="text-sm text-gray-600">
                                            Improvement: ${homeTeamReq.improvement_needed}
                                        </div>
                                    ` : `
                                        <div class="text-sm text-green-600 font-bold mt-3">✅ Already +EV!</div>
                                    `}
                                </div>
                            </div>
                        </div>
                        
                        <!-- Summary Stats -->
                        <div class="px-8 py-4 bg-yellow-50 border-b border-yellow-200">
                            <div class="grid grid-cols-4 gap-6 text-center">
                                <div>
                                    <div class="text-xl font-bold text-gray-900">${summary.total_bookmakers || 0}</div>
                                    <div class="text-sm text-gray-600">Books</div>
                                </div>
                                <div>
                                    <div class="text-xl font-bold text-green-600">${summary.positive_ev_count || 0}</div>
                                    <div class="text-sm text-gray-600">+EV Found</div>
                                </div>
                                <div>
                                    <div class="text-xl font-bold text-blue-600">${Object.keys(positiveEvReqs).length}</div>
                                    <div class="text-sm text-gray-600">Improvements</div>
                                </div>
                                <div>
                                    <div class="text-xl font-bold text-purple-600">7-Step</div>
                                    <div class="text-sm text-gray-600">Analysis</div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Bookmaker Analysis -->
                        <div class="px-8 py-6">
                            ${renderBookmakerSection(
                                '🏛️ Traditional Sportsbooks', 
                                ['pinnacle', 'draftkings', 'fanduel'],
                                'bg-blue-25',
                                'border-blue-300'
                            )}
                            ${renderBookmakerSection(
                                '⚡ P2P Exchanges', 
                                ['novig', 'prophetx', 'betopenly'],
                                'bg-purple-25',
                                'border-purple-300'
                            )}
                        </div>
                        
                        <!-- Methodology Footer -->
                        <div class="px-8 py-3 bg-gray-50 border-t border-gray-200">
                            <div class="text-xs text-gray-600">
                                <strong>7-Step Methodology:</strong> Sharp baseline → No-vig calculation → Best available line → 2% P2P fee → EV buffer (2% main/3% alt) → Compare current odds → Book-to-book opportunities
                            </div>
                        </div>
                    </div>
                `;
            }

            static renderLoadingSkeletons(count = 6) {
                const skeletons = Array(count).fill().map(() => `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden animate-pulse">
                        <div class="p-4 pb-2">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center">
                                    <div class="w-8 h-8 bg-gray-200 rounded-full mr-3"></div>
                                    <div class="bg-gray-200 rounded h-4 w-16"></div>
                                </div>
                                <div class="bg-gray-200 rounded-full h-6 w-16"></div>
                            </div>
                        </div>
                        <div class="px-4 pb-3">
                            <div class="bg-gray-200 rounded h-6 w-3/4 mb-2"></div>
                            <div class="bg-gray-200 rounded h-4 w-1/2"></div>
                        </div>
                        <div class="px-4 pb-3">
                            <div class="flex justify-between mb-2">
                                <div class="bg-gray-200 rounded h-4 w-24"></div>
                                <div class="bg-gray-200 rounded h-6 w-16"></div>
                            </div>
                            <div class="bg-gray-200 rounded h-4 w-20"></div>
                        </div>
                        <div class="bg-gray-50 border-t border-gray-200 p-4">
                            <div class="bg-gray-200 rounded h-8 w-full mb-2"></div>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="bg-gray-200 rounded h-4"></div>
                                <div class="bg-gray-200 rounded h-4"></div>
                                <div class="bg-gray-200 rounded h-4"></div>
                            </div>
                        </div>
                        <div class="p-4 pt-2">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-gray-200 rounded h-8"></div>
                                <div class="bg-gray-200 rounded h-8"></div>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                return skeletons;
            }

            // Helper methods
            static getSportIcon(sportKey) {
                const icons = {
                    'basketball_nba': '🏀',
                    'americanfootball_nfl': '🏈',
                    'baseball_mlb': '⚾',
                    'icehockey_nhl': '🏒',
                    'soccer_epl': '⚽'
                };
                return icons[sportKey] || '🏆';
            }

            static formatOdds(odds) {
                return odds > 0 ? `+${odds}` : odds.toString();
            }

            static formatCurrency(amount) {
                const sign = amount >= 0 ? '+' : '';
                return `${sign}$${Math.abs(amount).toFixed(2)}`;
            }

            static formatPercentage(value) {
                const sign = value >= 0 ? '+' : '';
                return `${sign}${value.toFixed(2)}%`;
            }

            static formatDateTime(isoString) {
                const date = new Date(isoString);
                const today = new Date();
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);

                const timeString = date.toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });

                if (date.toDateString() === today.toDateString()) {
                    return `Today, ${timeString}`;
                } else if (date.toDateString() === tomorrow.toDateString()) {
                    return `Tomorrow, ${timeString}`;
                } else {
                    return `${date.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric' 
                    })}, ${timeString}`;
                }
            }

            static formatTimeUntil(seconds) {
                if (seconds <= 0) return 'Started';
                
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                
                if (hours > 0) {
                    return `${hours}h ${minutes}m`;
                } else {
                    return `${minutes}m`;
                }
            }
        }

        // Error Handler
        class ErrorHandler {
            static show(message, type = 'error') {
                const container = document.getElementById('errorContainer');
                const id = 'error-' + Date.now();
                
                const colorClasses = {
                    error: 'bg-red-100 border-red-400 text-red-700',
                    warning: 'bg-yellow-100 border-yellow-400 text-yellow-700',
                    info: 'bg-blue-100 border-blue-400 text-blue-700',
                    success: 'bg-green-100 border-green-400 text-green-700'
                };

                const errorDiv = document.createElement('div');
                errorDiv.id = id;
                errorDiv.className = `${colorClasses[type]} px-4 py-3 rounded-lg shadow-lg mb-4 max-w-md`;
                errorDiv.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="text-sm">${message}</span>
                        <button onclick="document.getElementById('${id}').remove()" class="ml-4 text-current opacity-70 hover:opacity-100">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </div>
                `;

                container.appendChild(errorDiv);

                // Auto-remove after 5 seconds
                setTimeout(() => {
                    if (document.getElementById(id)) {
                        document.getElementById(id).remove();
                    }
                }, 5000);
            }
        }

        // Application Logic
        async function loadDashboardData() {
            try {
                // Show loading states
                document.getElementById('quickStatsContainer').innerHTML = `
                    <div class="p-6">
                        <div class="animate-pulse grid grid-cols-2 md:grid-cols-4 gap-6">
                            ${Array(4).fill().map(() => `
                                <div class="text-center">
                                    <div class="bg-gray-200 rounded h-8 w-16 mx-auto mb-2"></div>
                                    <div class="bg-gray-200 rounded h-4 w-20 mx-auto"></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                document.getElementById('opportunitiesContainer').innerHTML = `
                    <div class="p-8 text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto"></div>
                        <p class="mt-4 text-gray-600">Loading opportunities...</p>
                    </div>
                `;

                // Fetch real data from backend
                const response = await fetch('http://localhost:8000/api/future-games-with-ev?limit=20');
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('API Response:', data);
                
                // Process the real data
                const processedStats = processStatsFromEvents(data.events);
                const processedOpportunities = processOpportunitiesFromEvents(data.events);
                
                // Render the real data
                UIRenderer.renderQuickStats(processedStats);
                const opportunitiesHTML = processedOpportunities.map(opp => 
                    UIRenderer.renderOpportunityCard(opp)
                ).join('');
                
                if (opportunitiesHTML) {
                    document.getElementById('opportunitiesContainer').innerHTML = opportunitiesHTML;
                } else {
                    document.getElementById('opportunitiesContainer').innerHTML = `
                        <div class="p-8 text-center">
                            <p class="text-gray-600">No opportunities found for future games.</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Error loading dashboard data:', error);
                
                // Show error state
                document.getElementById('quickStatsContainer').innerHTML = `
                    <div class="p-6 bg-red-50 border border-red-200 rounded-lg">
                        <p class="text-red-600">Error loading stats: ${error.message}</p>
                    </div>
                `;
                
                document.getElementById('opportunitiesContainer').innerHTML = `
                    <div class="p-8 text-center">
                        <p class="text-red-600">Error loading opportunities: ${error.message}</p>
                        <p class="text-sm text-gray-500 mt-2">Make sure the backend server is running on localhost:8000</p>
                    </div>
                `;
            }
        }

        function processStatsFromEvents(events) {
            let totalOpportunities = 0;
            let positiveEvCount = 0;
            let bestEvValue = -Infinity;
            let totalEvents = events.length;

            events.forEach(event => {
                const summary = event.summary || {};
                totalOpportunities += summary.total_bookmakers || 0;
                positiveEvCount += summary.positive_ev_count || 0;
                
                const eventBestEv = summary.best_available_ev || -Infinity;
                if (eventBestEv > bestEvValue) {
                    bestEvValue = eventBestEv;
                }
            });

            return {
                total_events: totalEvents,
                total_opportunities: totalOpportunities,
                positive_ev_count: positiveEvCount,
                best_ev_value: bestEvValue === -Infinity ? 0 : bestEvValue
            };
        }

        function processOpportunitiesFromEvents(events) {
            const opportunities = [];

            events.forEach(event => {
                const bookmakerAnalysis = event.bookmaker_analysis || {};
                const positiveEvRequirements = event.positive_ev_requirements || {};
                
                // Create comprehensive event card
                opportunities.push({
                    event_id: event.event_id,
                    event_name: `${event.away_team} @ ${event.home_team}`,
                    sport: event.sport,
                    commence_time: event.commence_time,
                    bookmaker_analysis: bookmakerAnalysis,
                    positive_ev_requirements: positiveEvRequirements,
                    summary: event.summary
                });
            });

            return opportunities;
        }

        function updateDataStatus() {
            const statusElement = document.getElementById('lastUpdated');
            const dataStatus = document.getElementById('dataStatus');
            
            if (appState.lastUpdated) {
                const timeAgo = Math.floor((Date.now() - appState.lastUpdated.getTime()) / 1000);
                const minutes = Math.floor(timeAgo / 60);
                
                if (minutes === 0) {
                    statusElement.textContent = 'Just updated';
                } else {
                    statusElement.textContent = `Updated ${minutes}m ago`;
                }

                // Update status indicator
                const indicator = dataStatus.querySelector('.w-2.h-2');
                if (minutes < 5) {
                    indicator.className = 'w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse';
                } else if (minutes < 10) {
                    indicator.className = 'w-2 h-2 bg-yellow-500 rounded-full mr-2';
                } else {
                    indicator.className = 'w-2 h-2 bg-red-500 rounded-full mr-2';
                }
            }
        }

        function updateOpportunityCount(count) {
            document.getElementById('opportunityCount').textContent = count || 0;
        }

        function startAutoRefresh() {
            if (appState.refreshTimer) {
                clearInterval(appState.refreshTimer);
            }

            appState.refreshTimer = setInterval(() => {
                if (!document.hidden) {
                    loadDashboardData();
                }
            }, API_CONFIG.refreshInterval);
        }

        function updateNextRefreshTime() {
            const nextRefreshElement = document.getElementById('nextRefresh');
            let nextRefreshTime = new Date(Date.now() + API_CONFIG.refreshInterval);
            
            const updateTimer = setInterval(() => {
                const now = new Date();
                const diff = nextRefreshTime - now;
                
                if (diff > 0) {
                    const minutes = Math.floor(diff / 60000);
                    const seconds = Math.floor((diff % 60000) / 1000);
                    nextRefreshElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                } else {
                    nextRefreshElement.textContent = 'Refreshing...';
                    nextRefreshTime = new Date(Date.now() + API_CONFIG.refreshInterval);
                }
            }, 1000);
        }

        // Event Handlers
        function setupEventHandlers() {
            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Update active state
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white');
                        b.classList.add('text-gray-700', 'bg-white');
                    });
                    
                    e.target.classList.add('bg-blue-600', 'text-white');
                    e.target.classList.remove('text-gray-700', 'bg-white');

                    // Update filter
                    appState.currentFilters.sport_key = e.target.dataset.sport;
                    appState.currentOffset = 0;
                    loadDashboardData();
                });
            });

            // Sort dropdown
            document.getElementById('sortSelect').addEventListener('change', (e) => {
                appState.currentFilters.sort_by = e.target.value;
                appState.currentOffset = 0;
                loadDashboardData();
            });

            // Min EV filter
            document.getElementById('minEVFilter').addEventListener('input', (e) => {
                appState.currentFilters.min_ev_threshold = parseFloat(e.target.value) || -1000;
                appState.currentOffset = 0;
                loadDashboardData();
            });

            // Search input
            let searchTimeout;
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    appState.currentFilters.search_query = e.target.value;
                    appState.currentOffset = 0;
                    loadDashboardData();
                }, 500);
            });

            // Refresh button
            document.getElementById('refreshButton').addEventListener('click', () => {
                loadDashboardData();
            });

            // Update data status every 30 seconds
            setInterval(updateDataStatus, 30000);
        }

        // Global Functions (called from HTML)
        function viewEventDetails(eventId) {
            window.location.href = `event-detail.html?id=${eventId}`;
        }

        function addToWatchlist(opportunityId) {
            ErrorHandler.show('Added to watchlist!', 'info');
        }

        function clearFilters() {
            appState.currentFilters = {
                sport_key: '',
                search_query: '',
                min_ev_threshold: -1000,  // Show all EVs, including negative
                positive_ev_only: false,  // Show both positive and negative EVs
                sort_by: 'ev_weighted'
            };
            
            // Reset UI
            document.getElementById('searchInput').value = '';
            document.getElementById('sortSelect').value = 'ev_weighted';
            document.getElementById('minEVFilter').value = '-1000';
            
            // Reset filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('text-gray-700', 'bg-white');
            });
            document.querySelector('[data-sport=""]').classList.add('bg-blue-600', 'text-white');

            appState.currentOffset = 0;
            loadDashboardData();
        }

        // Initialize Application
        document.addEventListener('DOMContentLoaded', () => {
            setupEventHandlers();
            loadDashboardData();
            startAutoRefresh();
            updateNextRefreshTime();
        });
    </script>
